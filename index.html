<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#4ec0ca">
<title>🦩 Flamingo Revolution</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="game">
    <div id="nightOverlay"></div>
    <div class="mountains-bg"></div>
    <div class="sun"></div>
    <div class="grass"></div>
    <div class="cloud cloud1">☁️</div>
    <div class="cloud cloud2">☁️</div>
    <div class="cloud cloud3">☁️</div>

    <div id="score">0</div>
    <div id="lives">❤️❤️❤️</div>
    <div id="message"></div>

    <div id="player">🦩</div>

    <div id="startScreen">
        <h1>🦩 Flamingo Revolution</h1>
        <div class="tagline">Save Sazan · Collect Flamingos · Defeat Rama</div>
        <p>
            🌊 Save the lagoon.<br>
            🦩 Collect flamingos.<br>
            🚫 Avoid Edi Rama.
        </p>
        <button onclick="startGame()">Start Revolution</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
