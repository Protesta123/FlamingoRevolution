<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a1a">
<title>🦩 Flamingo Revolution</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="game">
    <div id="nightOverlay"></div>

    <div class="mountains-bg"></div>
    <div class="sun"></div>
    <div class="grass"></div>
    <div class="cloud cloud1">☁️</div>
    <div class="cloud cloud2">☁️</div>
    <div class="cloud cloud3">☁️</div>

    <!-- HUD -->
    <div id="hudPanel">
        <div id="scoreLabel">SCORE</div>
        <div id="score">0</div>
        <div id="livesLabel">LIVES</div>
        <div id="lives">❤️❤️❤️</div>
    </div>

    <!-- Shield HUD badge (always visible when shielded) -->
    <div id="shieldBadge">🛡️ SHIELD</div>

    <!-- Combo counter -->
    <div id="comboDisplay"></div>

    <div id="message"></div>

    <div id="player">🦩</div>

    <!-- Particle canvas -->
    <canvas id="particleCanvas"></canvas>

    <div id="startScreen">
        <img src="images/ramahunting.png" id="heroImg" alt="">
        <div id="startContent">
            <h1>🦩 Flamingo<br>Revolution</h1>
            <div class="tagline">Save Sazan · Collect Flamingos · Defeat Rama</div>
            <p>
                🌊 Save the lagoon.<br>
                🦩 Collect flamingos.<br>
                🚫 Avoid Edi Rama.
            </p>
            <button onclick="startGame()">▶ START</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
